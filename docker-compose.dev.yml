# ==============================================
# Docker Compose para Desarrollo Local
# ==============================================

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: inmobiliaria_dev_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./storage/app:/var/www/html/storage/app
    environment:
      - APP_NAME="Inmobiliaria Dev"
      - APP_ENV=local
      - APP_KEY=
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=inmobiliaria_dev
      - DB_USERNAME=root
      - DB_PASSWORD=root
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=database
      - QUEUE_CONNECTION=database
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "8000:80"
    networks:
      - inmobiliaria_dev_network

  mysql:
    image: mysql:8.0
    container_name: inmobiliaria_dev_mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=inmobiliaria_dev
    ports:
      - "3307:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
    networks:
      - inmobiliaria_dev_network

  redis:
    image: redis:7-alpine
    container_name: inmobiliaria_dev_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    networks:
      - inmobiliaria_dev_network

networks:
  inmobiliaria_dev_network:
    driver: bridge

volumes:
  mysql_dev_data:
    driver: local
