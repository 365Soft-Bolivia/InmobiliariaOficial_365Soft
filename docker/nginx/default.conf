# ================================================================
# Nginx interno — Laravel + Inertia.js
# SSL y dominio los maneja Nginx Proxy Manager externamente.
# Este servidor solo escucha en :80 dentro de la red Docker.
# ================================================================
server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    charset utf-8;

    # Tamaño máximo de subida (debe coincidir con PHP y NPM)
    client_max_body_size 100M;

    # ── Cabeceras de seguridad ─────────────────────────────────
    add_header X-Frame-Options            "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options     "nosniff"                         always;
    add_header X-XSS-Protection           "1; mode=block"                   always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;

    # ── Compresión Gzip ────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json application/xml
        image/svg+xml font/woff font/woff2;

    # ── Archivos subidos por usuarios ──────────────────────────
    # Volumen app_storage montado en /var/www/html/storage/app
    location /storage/ {
        alias /var/www/html/storage/app/public/;
        expires 7d;
        add_header Cache-Control "public, must-revalidate";
        try_files $uri =404;
    }

    # ── Assets estáticos de Vite (build inmutable) ─────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
        access_log off;
    }

    # ── Rutas de la aplicación Laravel ────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    # ── PHP-FPM ────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass            app:9000;
        fastcgi_index           index.php;
        fastcgi_param           SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include                 fastcgi_params;
        fastcgi_hide_header     X-Powered-By;

        # Pasar cabeceras originales de NPM (HTTPS, IP real del cliente)
        fastcgi_param           HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param           HTTP_X_FORWARDED_FOR   $http_x_forwarded_for;
        fastcgi_param           HTTP_X_REAL_IP         $http_x_real_ip;

        fastcgi_read_timeout    300;
        fastcgi_connect_timeout 60;
        fastcgi_send_timeout    300;
        fastcgi_buffer_size     128k;
        fastcgi_buffers         4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # ── Bloquear archivos ocultos ──────────────────────────────
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
