# ==============================================
# Docker Compose Producción - Inmobiliaria 365Soft
# ==============================================

services:
  app:
    build: .
    container_name: inmobiliaria_365soft_app
    restart: unless-stopped
    environment:
      - APP_NAME=${APP_NAME}
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_URL=${APP_URL}
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=database
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./storage/app:/var/www/html/storage/app
    networks:
      - inmobiliaria_network
      - npm_network
    depends_on:
      - mysql
      - redis

  queue:
    build: .
    container_name: inmobiliaria_365soft_queue
    restart: unless-stopped
    command: php artisan queue:work --tries=3 --timeout=90
    environment:
      - APP_NAME=${APP_NAME}
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=redis
    networks:
      - inmobiliaria_network
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.0
    container_name: inmobiliaria_365soft_mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_DATABASE}
      - MYSQL_USER=${DB_USERNAME}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - inmobiliaria_network

  redis:
    image: redis:7-alpine
    container_name: inmobiliaria_365soft_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - inmobiliaria_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: inmobiliaria_365soft_phpmyadmin
    restart: unless-stopped
    environment:
      - PMA_HOST=mysql
      - PMA_USER=${DB_USERNAME}
      - PMA_PASSWORD=${DB_PASSWORD}
    networks:
      - inmobiliaria_network
      - npm_network

networks:
  inmobiliaria_network:
    driver: bridge
  npm_network:
    external: true
    name: nginx-proxy_npm_network

volumes:
  mysql_data:
  redis_data:
