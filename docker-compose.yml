services:

  # ── PHP-FPM Application ─────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: inmobiliaria_365soft_php
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
      - app_cache:/var/www/html/bootstrap/cache
    env_file:
      - .env
    networks:
      - inmobiliaria_internal
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Nginx — nombre exacto que NPM usa como destino ──────────
  # NPM rutea: inmobiliaria.acmanalytics.online → inmobiliaria_365soft_app:80
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx
    container_name: inmobiliaria_365soft_app
    restart: unless-stopped
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app_storage:/var/www/html/storage/app:ro
    networks:
      - inmobiliaria_internal   # Para hablar con php-fpm
      - proxy_network           # Para que NPM lo alcance
    depends_on:
      - app

  # ── MySQL 8.0 ──────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: inmobiliaria_365soft_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      TZ: ${APP_TIMEZONE:-America/Caracas}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    networks:
      - inmobiliaria_internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis 7 ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: inmobiliaria_365soft_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - inmobiliaria_internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  app_storage:
    driver: local
  app_logs:
    driver: local
  app_cache:
    driver: local

networks:
  # Red privada entre los servicios de esta app
  inmobiliaria_internal:
    driver: bridge

  # Red compartida con Nginx Proxy Manager (ya existe en el VPS)
  proxy_network:
    external: true
    name: geopricer_365soft_app-network
